<section id="statement-of-ethics">
  <h2>📜 Statement of Ethics</h2>
  <ol>
    <li>Software is not built in a vacuum. It is irresponsible to pretend the effects of code we write are entirely out of our control.</li>
    <li>Oppressive systems can evolve without their constituents knowing about them. We must not fall into willful ignorance.</li>
  </ol>
</section>
